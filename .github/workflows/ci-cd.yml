name: CI/CD Build and Push

on:
  push:
    branches: [ main ] # Срабатывает при пуше в ветку main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Tests
        run: go test -v ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: tests # Запустится только если тесты прошли успешно
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Настройка эмулятора для сборки под ARM64 (архитектура Малинки)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Логинимся в твой Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Сборка и пуш МУЗЫКАЛЬНОГО СЕРВИСА
      - name: Build and push Music Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/music-service:latest
          build-args: |
            CMD_PATH=cmd/service

      # Сборка и пуш ВОРКЕРА
      - name: Build and push Music Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/music-worker:latest
          build-args: |
            CMD_PATH=cmd/worker