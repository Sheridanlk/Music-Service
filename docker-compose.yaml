services:
  minio:
    image: minio/minio:latest
    container_name: music_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-musicadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supersecret_minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio_init:
    image: minio/mc:latest
    container_name: music_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-musicadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supersecret_minio}
      ORIGINAL_BUCKET: ${ORIGINAL_BUCKET:-media-origin}
      HLS_BUCKET: ${HLS_BUCKET:-media-hls}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$ORIGINAL_BUCKET || true &&
      mc mb -p local/$$HLS_BUCKET || true &&
      echo 'Buckets ensured';
      "
  postgres:
    image: postgres:15-alpine
    container_name: music_postgres
    environment:
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD:-postgres}
      POSTGRES_DB: music
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres_init:
    image: migrate/migrate:4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGSQL_PASSWORD: ${PGSQL_PASSWORD:-postgres}
    volumes:
      - ./migrations:/migrations:ro
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:${PGSQL_PASSWORD}@postgres:5432/music?sslmode=disable",
      "up"
    ]
    restart: "no"

volumes:
  minio_data: 
  pg_data: